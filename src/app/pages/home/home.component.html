<section class="hero">
  <img
    [ngSrc]="'/background-home.jpg'"
    priority
    fill
    alt="Piese auto turbo"
    class="hero__img"
  />

  <div class="hero__overlay"></div>

  <div class="hero__content">
    <div class="hero__eyebrow">Performanță • Fiabilitate • Calitate</div>

    <h1 class="hero__title">
      Piese auto de calitate
      <span>pentru fiecare drum</span>
    </h1>

    <p class="hero__description">
      Descoperă piese auto fiabile și performante care îți mențin mașina în cea
      mai bună stare. De la piese uzuale până la componente premium,
      avem tot ce ai nevoie.
    </p>

    <div class="hero__actions">
      <button class="hero__button" type="button" (click)="router.goToProducts()">
        Vezi produsele
      </button>
    </div>
  </div>
</section>
