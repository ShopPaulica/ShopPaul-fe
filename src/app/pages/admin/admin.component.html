<header class="header-admin">
  <h2 [class.header-admin-active]="selectedTab ===2"  (click)="selectTab(2)">Products</h2>
  <h2>|</h2>
  <h2 [class.header-admin-active]="selectedTab ===1"  (click)="selectTab(1)">Orders</h2>
  <h2>|</h2>
  <h2 [class.header-admin-active]="selectedTab ===3"  (click)="selectTab(3)">Vehicles</h2>
  <h2>|</h2>
  <h2 [class.header-admin-active]="selectedTab ===4"  (click)="selectTab(4)">Sections</h2>
</header>
<section class="admin-body">
  @switch (selectedTab) {
    @case (4) {
      <app-parts  class="admin">
      </app-parts>
    }
    @case (3) {
      <app-vehicles class="admin" >
      </app-vehicles>
    }
    @case (2) {
      <div class="admin" [formGroup]="formProduct">


        <div class="file-preview">
          @if(previewUrl){
            <img [src]="previewUrl" alt="Preview">
          }
        </div>




        <div class="file-field">
          <input
            #fileInput
            class="file-input"
            type="file"
            (change)="onImageSelected($event)"
          />

          <button type="button" class="file-btn" (click)="fileInput.click()">
            {{ selectedFileName || 'Chose an image' }}
          </button>
        </div>

        <div class="input-wrapper">
          <label>Title</label>
          <input type="text" formControlName="title" />
        </div>

        <div class="input-wrapper">
          <label> Description</label>
          <input type="text" formControlName="description" />
        </div>

        <div class="input-wrapper">
          <label>Price</label>
          <input type="number" formControlName="price" />
        </div>

        <button class="save-button" (click)="saveProduct()">
          save
        </button>
      </div>
    }
    @case (1) {
       <app-orders-list></app-orders-list>
    }
  }
</section>
