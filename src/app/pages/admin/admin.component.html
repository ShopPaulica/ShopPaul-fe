<header class="header-admin">
  <h2 (click)="selectTab(2)">Products</h2>
  <h2>|</h2>
  <h2 (click)="selectTab(1)">Orders</h2>
  <h2>|</h2>
  <h2 (click)="selectTab(3)">Vehicles</h2>
  <h2>|</h2>
  <h2 (click)="selectTab(4)">Sections</h2>
</header>
<section class="admin-body">
  @switch (selectedTab) {
    @case (4) {
      <div class="admin" [formGroup]="formParts">

        <div class="input-wrapper">
          <label>Section</label>
          <input type="text" formControlName="section" />
        </div>

        <div class="input-wrapper">
          <label> Subsection</label>
          <input type="text" formControlName="subsection" />
        </div>

        <div class="input-wrapper">
          <label>Title</label>
          <input type="text" formControlName="title" />
        </div>

        <button class="save-button" (click)="saveParts()">
          save
        </button>
      </div>
    }
    @case (3) {
      <div class="admin" [formGroup]="formVehicles">

        <div class="input-wrapper">
          <label>Brand</label>
          <input type="text" formControlName="brand" />
        </div>

        <div class="input-wrapper">
          <label> Model</label>
          <input type="text" formControlName="model" />
        </div>

        <div class="input-wrapper">
          <label>Fuel</label>
          <input type="text" formControlName="fuel" />
        </div>

        <div class="input-wrapper">
          <label> Power</label>
          <input type="text" formControlName="power" />
        </div>

        <div class="input-wrapper">
          <label>Engine</label>
          <input type="text" formControlName="engine" />
        </div>

        <button class="save-button" (click)="saveVehicles()">
          save
        </button>
      </div>
    }
    @case (2) {
      <div class="admin" [formGroup]="formProduct">


        <div class="file-preview">
          @if(previewUrl){
            <img [src]="previewUrl" alt="Preview">
          }
        </div>




        <div class="file-field">
          <input
            #fileInput
            class="file-input"
            type="file"
            (change)="onImageSelected($event)"
          />

          <button type="button" class="file-btn" (click)="fileInput.click()">
            {{ selectedFileName || 'Chose an image' }}
          </button>
        </div>

        <div class="input-wrapper">
          <label>Title</label>
          <input type="text" formControlName="title" />
        </div>

        <div class="input-wrapper">
          <label> Description</label>
          <input type="text" formControlName="description" />
        </div>

        <div class="input-wrapper">
          <label>Price</label>
          <input type="number" formControlName="price" />
        </div>

        <button class="save-button" (click)="saveProduct()">
          save
        </button>
      </div>
    }
    @case (1) {
       <app-orders-list></app-orders-list>
    }
  }
</section>
